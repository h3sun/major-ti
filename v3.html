<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大学专业 / 职业方向倾向测试 v3 · Major-TI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f2ea;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #fffdf8;
      --text-primary: #1f1a17;
      --text-secondary: #61554d;
      --text-muted: #93857b;
      --border: rgba(93, 74, 61, 0.12);
      --shadow: 0 20px 60px rgba(55, 40, 31, 0.08);
      --accent: #2c241f;
      --a: #295ea8;
      --b: #0f8b6d;
      --c: #b35c15;
      --d: #b4476b;
      --radius: 18px;
    }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,.85), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,243,228,.9), transparent 30%),
        linear-gradient(135deg, #f4efe6 0%, #f8f5ee 55%, #efe7dc 100%);
      display: flex;
      justify-content: center;
      padding: 0 20px 72px;
    }
    #progress-wrap {
      position: fixed;
      inset: 0 0 auto 0;
      height: 4px;
      background: rgba(44, 36, 31, 0.08);
      display: none;
      z-index: 30;
    }
    #progress-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--a), var(--b), var(--c), var(--d));
      transition: width .28s ease;
    }
    .shell {
      width: 100%;
      max-width: 860px;
      padding-top: 28px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      color: var(--text-muted);
      font-size: 13px;
    }
    .logo {
      font-family: 'Noto Serif SC', serif;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .counter { display: none; }
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn .28s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .panel {
      background: var(--surface);
      backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    #screen-landing .hero {
      padding: 72px 32px 44px;
      text-align: center;
    }
    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--border);
      padding: 7px 14px;
      border-radius: 999px;
      color: var(--text-muted);
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 24px;
      background: rgba(255,255,255,.55);
    }
    .hero h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(30px, 6vw, 52px);
      line-height: 1.22;
      margin-bottom: 18px;
    }
    .hero p {
      max-width: 620px;
      margin: 0 auto;
      color: var(--text-secondary);
      line-height: 1.9;
      font-size: 15px;
    }
    .hero .note {
      margin-top: 14px;
      color: var(--text-muted);
      font-size: 12px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 34px 0;
    }
    .stat {
      background: rgba(255,255,255,.62);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px 12px;
    }
    .stat .num {
      display: block;
      font-family: 'Noto Serif SC', serif;
      font-size: 30px;
      margin-bottom: 4px;
    }
    .stat .label {
      font-size: 12px;
      color: var(--text-muted);
    }
    .type-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .type-pill {
      border-radius: 20px;
      padding: 16px 14px;
      color: #fff;
      text-align: left;
    }
    .type-pill strong {
      display: block;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .type-pill span {
      display: block;
      font-size: 12px;
      line-height: 1.5;
      opacity: .9;
    }
    .type-a { background: linear-gradient(135deg, #2d67b8, #214a89); }
    .type-b { background: linear-gradient(135deg, #0f9b79, #0c6d56); }
    .type-c { background: linear-gradient(135deg, #d07b30, #a95413); }
    .type-d { background: linear-gradient(135deg, #ca5d85, #a83c62); }
    .btn-primary, .btn-secondary {
      border: none;
      border-radius: 999px;
      font-family: inherit;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    .btn-primary:hover, .btn-secondary:hover { transform: translateY(-1px); opacity: .92; }
    .btn-primary {
      margin-top: 28px;
      padding: 15px 40px;
      background: var(--accent);
      color: white;
      font-size: 15px;
      font-weight: 600;
    }

    #screen-question .panel { padding: 28px 28px 30px; }
    .question-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 12px;
    }
    .btn-back {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      visibility: hidden;
    }
    .btn-back.visible { visibility: visible; }
    .question-tag {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .question-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(22px, 4vw, 30px);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .options {
      display: grid;
      gap: 12px;
    }
    .option {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.72);
      border-radius: 18px;
      padding: 18px 18px 18px 16px;
      text-align: left;
      cursor: pointer;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: transform .12s ease, border-color .15s ease, background .15s ease;
      font-family: inherit;
    }
    .option:hover {
      transform: translateX(4px);
      border-color: rgba(44, 36, 31, 0.2);
      background: rgba(255,255,255,.95);
    }
    .option.selected {
      border-color: rgba(44, 36, 31, 0.22);
      background: #fffdf9;
    }
    .option-letter {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
      background: #efe7dc;
      border: 1px solid rgba(44, 36, 31, 0.08);
    }
    .option-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-primary);
    }

    #screen-result .panel { padding: 30px; }
    .result-intro {
      margin-bottom: 18px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
    }
    .card-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: .12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .card h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(24px, 4vw, 34px);
      margin-bottom: 8px;
    }
    .subline {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.8;
    }
    .mix-badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      color: white;
      font-weight: 700;
    }
    .bars {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }
    .bar-item {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
    }
    .bar-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 8px;
    }
    .bar-name {
      font-size: 14px;
      font-weight: 600;
    }
    .bar-pct {
      font-size: 12px;
      color: var(--text-muted);
    }
    .bar-bg {
      height: 8px;
      border-radius: 999px;
      background: #ece5db;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      transition: width .8s cubic-bezier(.16,1,.3,1);
    }
    .recommend {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 18px;
    }
    .recommend h3 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .recommend p {
      color: var(--text-secondary);
      line-height: 1.85;
      font-size: 14px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 10px;
    }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: #f1ebe3;
      color: var(--text-secondary);
      font-size: 12px;
    }
    .catalog {
      background: var(--surface-strong);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 18px;
    }
    .catalog h3 {
      font-size: 16px;
      margin-bottom: 16px;
    }
    .catalog-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .catalog-card {
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 16px;
      background: rgba(255,255,255,.6);
    }
    .catalog-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .catalog-badge {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      color: white;
      font-weight: 700;
      flex-shrink: 0;
    }
    .catalog-name {
      font-weight: 600;
      font-size: 14px;
    }
    .catalog-short {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .catalog-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 6px;
    }
    .catalog-fit {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    .footnote {
      color: var(--text-muted);
      line-height: 1.8;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .btn-secondary {
      padding: 13px 28px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 14px;
    }
    @media (max-width: 760px) {
      .stats, .type-grid, .result-grid, .catalog-grid { grid-template-columns: 1fr; }
      .hero { padding-left: 22px; padding-right: 22px; }
      #screen-question .panel, #screen-result .panel { padding: 22px; }
    }
  </style>
</head>
<body>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
  <div class="shell">
    <div class="topbar">
      <div class="logo">Major-TI · v3</div>
      <div class="counter" id="counter"></div>
    </div>

    <section class="screen active" id="screen-landing">
      <div class="panel hero">
        <div class="eyebrow">测试你是哪个专业的</div>
        <h1>你的思维，<br />会暴露你更像哪个学科</h1>
        <p>
          这不是知识竞赛，也不是标准答案测试。<br />
          20 道题只看一件事：面对复杂问题时，<br />
          你更自然调用哪套认知工具。
        </p>
        <div class="note">没有正确答案，只有更稳定的偏好。</div>
        <div class="stats">
          <div class="stat"><span class="num" id="question-count">20</span><span class="label">道题目</span></div>
          <div class="stat"><span class="num">4</span><span class="label">核心倾向</span></div>
          <div class="stat"><span class="num">2</span><span class="label">主辅结果</span></div>
        </div>
        <div class="type-grid">
          <div class="type-pill type-a"><strong>A 型</strong><span>工程 / 计算机 / 数学 / 数据 / 医学</span></div>
          <div class="type-pill type-b"><strong>B 型</strong><span>商业 / 管理 / 金融 / 创业</span></div>
          <div class="type-pill type-c"><strong>C 型</strong><span>人文 / 法律 / 教育 / 传媒</span></div>
          <div class="type-pill type-d"><strong>D 型</strong><span>艺术 / 设计 / 心理 / 社会服务</span></div>
        </div>
        <button class="btn-primary" id="btn-start">开始测试</button>
      </div>
    </section>

    <section class="screen" id="screen-question">
      <div class="panel">
        <div class="question-head">
          <button class="btn-back" id="btn-back">← 上一题</button>
          <div class="question-tag" id="question-tag">单选题</div>
        </div>
        <div class="question-title" id="question-title"></div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <section class="screen" id="screen-result">
      <div class="panel">
        <div class="result-intro">你的测试结果</div>
        <div class="result-grid">
          <div class="card" id="primary-card"></div>
          <div class="card" id="mix-card"></div>
        </div>
        <div class="bars" id="bars"></div>
        <div class="recommend" id="recommend"></div>
        <div class="catalog">
          <h3>四型全图鉴</h3>
          <div class="catalog-grid" id="catalog-grid"></div>
        </div>
        <div class="footnote">
          这份结果更适合做初步探索。真正选专业时，还要一起看成绩、长期投入意愿、家庭资源、学校课程设置和就业环境。
        </div>
        <button class="btn-secondary" id="btn-retry">再测一次</button>
      </div>
    </section>
  </div>

  <script>
    const TRACKS = {

    const MIX = {
      'ab': {
        name: 'A-B 型｜技术商业型',
        desc: '你既有技术和分析能力，也有结果意识和现实判断。适合产品、数据、金融工程、商业分析、创业等复合路线。'
      },
      'ac': {
        name: 'A-C 型｜技术表达型',

      },

      },
      'cd': {
        name: 'C-D 型｜人文关怀型',
        desc: '你对人、意义和情绪变化都比较敏感。适合心理学、教育、社会工作、传媒、艺术治疗、公益和内容创作。'

    };

    const LETTER_CLASS = { A: 'letter-a', B: 'letter-b', C: 'letter-c', D: 'letter-d' };
    const scoreState = { a: 0, b: 0, c: 0, d: 0 };
    const history = [];

    const QUESTIONS = [
  {

  {

let currentQ = 0;
    let allQuestions = [];

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach((screen) => screen.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function syncCounts() {
      const count = String(QUESTIONS.length);
      const counter = document.getElementById('question-count');
      if (counter) counter.textContent = count;
    }

    function resetScores() {
      Object.keys(scoreState).forEach((key) => { scoreState[key] = 0; });
      history.length = 0;
    }

    function addScore(delta) {
      Object.entries(delta || {}).forEach(([key, value]) => {
        scoreState[key] = (scoreState[key] || 0) + value;
      });
    }

    function subScore(delta) {
      Object.entries(delta || {}).forEach(([key, value]) => {
        scoreState[key] = (scoreState[key] || 0) - value;
      });
    }

    function updateProgress() {
      const total = allQuestions.length;
      const pct = total ? (currentQ / total) * 100 : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('counter').textContent = `${currentQ + 1} / ${total}`;
      document.getElementById('btn-back').classList.toggle('visible', currentQ > 0);
    }

    function shuffleArray(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startQuiz() {
      allQuestions = shuffleArray(QUESTIONS).map((question) => ({
        ...question,
        options: shuffleArray(question.options.map((option) => ({ ...option })))
      }));
      currentQ = 0;
      resetScores();
      document.getElementById('progress-wrap').style.display = 'block';
      document.getElementById('counter').style.display = 'block';
      showScreen('screen-question');
      renderQuestion();
    }

    function renderQuestion() {
      const question = allQuestions[currentQ];
      updateProgress();
      document.getElementById('question-title').textContent = question.text;
      document.getElementById('question-tag').textContent = `单选题 · 第 ${currentQ + 1} 题`;
      const options = document.getElementById('options');
      options.innerHTML = '';

      question.options.forEach((option, index) => {
        const letter = ['A', 'B', 'C', 'D'][index];
        const button = document.createElement('button');
        button.className = 'option';
        button.innerHTML = `
          <span class="option-letter">${letter}</span>
          <span class="option-text">${option.text}</span>
        `;
        button.addEventListener('click', () => {
          button.classList.add('selected');
          options.querySelectorAll('.option').forEach((node) => { node.style.pointerEvents = 'none'; });
          addScore(option.score);
          history.push(option.score || {});
          setTimeout(nextQuestion, 220);
        });
        options.appendChild(button);
      });
    }

    function nextQuestion() {
      currentQ += 1;
      if (currentQ < allQuestions.length) {
        renderQuestion();
      } else {
        showResults();
      }
    }

    function goBack() {
      if (currentQ === 0) return;
      currentQ -= 1;
      const last = history.pop();
      subScore(last);
      showScreen('screen-question');
      renderQuestion();
    }

    function sortedScores() {
      return Object.entries(scoreState).sort((a, b) => b[1] - a[1]);
    }

    function getMix(primaryKey, secondaryKey) {
      const pair = [primaryKey, secondaryKey].sort().join('');
      return MIX[pair];
    }

    function renderBars() {
      const bars = document.getElementById('bars');
      bars.innerHTML = '';
      sortedScores().forEach(([key, value]) => {
        const meta = TRACKS[key];
        const pct = Math.round((value / QUESTIONS.length) * 100);
        const item = document.createElement('div');
        item.className = 'bar-item';
        item.innerHTML = `
          <div class="bar-head">
            <div class="bar-name">${meta.key} 型 · ${meta.name}</div>
            <div class="bar-pct">${value} / ${QUESTIONS.length} · ${pct}%</div>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" style="background:${meta.color}" data-pct="${pct}"></div>
          </div>
        `;
        bars.appendChild(item);
      });
      requestAnimationFrame(() => {
        document.querySelectorAll('.bar-fill').forEach((bar) => {
          bar.style.width = `${bar.dataset.pct}%`;
        });
      });
    }

    function showResults() {
      document.getElementById('progress-fill').style.width = '100%';
      document.getElementById('counter').style.display = 'none';

      const ranking = sortedScores();
      const [primaryKey, primaryScore] = ranking[0];
      const [secondaryKey, secondaryScore] = ranking[1];
      const primary = TRACKS[primaryKey];
      const secondary = TRACKS[secondaryKey];
      const mix = getMix(primaryKey, secondaryKey);

      const primaryCard = document.getElementById('primary-card');
      primaryCard.style.borderColor = primary.color;
      primaryCard.innerHTML = `
        <div class="card-label">主倾向</div>
        <div class="mix-badge" style="background:${primary.color}">${primary.key} 型</div>
        <h2 style="color:${primary.color}">${primary.name}</h2>
        <div class="subline">${primary.short}</div>
        <div class="subline" style="margin-top:12px">${primary.desc}</div>
      `;

      const mixCard = document.getElementById('mix-card');
      mixCard.style.borderColor = secondary.color;
      mixCard.innerHTML = `
        <div class="card-label">辅助倾向</div>
        <div class="mix-badge" style="background:${secondary.color}">${secondary.key} 型</div>
        <h2 style="color:${secondary.color}">${secondary.name}</h2>
        <div class="subline">${secondary.short}</div>
        <div class="subline" style="margin-top:12px">第二高分通常代表你的辅助优势。你不是单一路径型，往往更适合复合方向。</div>
      `;

      const recommend = document.getElementById('recommend');
      recommend.innerHTML = `
        <h3>${mix ? mix.name : `${primary.key}-${secondary.key} 型`}</h3>
        <p>${mix ? mix.desc : '你的结果显示出明显的复合倾向，建议优先考虑跨学科或可自由组合课程的路径。'}</p>
        <div class="chips">
          <span class="chip">主倾向专业：${primary.majors}</span>
          <span class="chip">辅助倾向专业：${secondary.majors}</span>
        </div>
        <p>${primary.fit} 同时，${secondary.name}这部分也说明你在另外一种任务环境中会更有手感。选专业时，不要只看名字，要看课程结构是否允许你把这两类优势真正组合起来。</p>
      `;

      renderBars();
      renderCatalog();
      showScreen('screen-result');
    }

    function renderCatalog() {
      const grid = document.getElementById('catalog-grid');
      grid.innerHTML = '';
      Object.entries(TRACKS).forEach(([, track]) => {
        const card = document.createElement('div');
        card.className = 'catalog-card';
        card.innerHTML = `
          <div class="catalog-card-header">
            <span class="catalog-badge" style="background:${track.color}">${track.key} 型</span>
            <span class="catalog-name">${track.name}</span>
          </div>
          <div class="catalog-short">${track.short}</div>
          <div class="catalog-desc">${track.desc}</div>
          <div class="catalog-fit">${track.fit}</div>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById('btn-start').addEventListener('click', startQuiz);
    document.getElementById('btn-back').addEventListener('click', goBack);
    document.getElementById('btn-retry').addEventListener('click', () => {
      document.getElementById('progress-wrap').style.display = 'none';
      showScreen('screen-landing');
    });

    syncCounts();
  </script>
