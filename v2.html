<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>认知范式识别系统 v2 · Major-TI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8; --surface: #fff; --text-primary: #1a1a1a;
      --text-secondary: #5a5a5a; --text-muted: #9b9b9b;
      --accent: #1a1a1a; --border: #e8e8e4; --hover-bg: #f4f4f0;
      --radius: 12px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans SC','PingFang SC',sans-serif;
      background: var(--bg); color: var(--text-primary);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    }
    #progress-bar-wrap {
      position: fixed; top:0; left:0; right:0;
      height:3px; background:var(--border); z-index:100; display:none;
    }
    #progress-bar-fill { height:100%; background:var(--accent); transition:width .4s ease; width:0; }
    .site-header {
      width:100%; max-width:740px; padding:28px 24px 0;
      display:flex; align-items:center; justify-content:space-between;
    }
    .logo {
      font-family:'Noto Serif SC',serif; font-size:14px; font-weight:600;
      letter-spacing:.05em; opacity:.6;
    }
    .q-counter { font-size:13px; color:var(--text-muted); display:none; }
    .container { width:100%; max-width:740px; padding:0 24px 80px; flex:1; }
    .screen { display:none; }
    .screen.active { display:block; }
    .fade-in { animation:fadeIn .3s forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    /* ── Landing ── */
    #screen-landing { padding-top:72px; text-align:center; }
    .landing-badge {
      display:inline-block; font-size:11px; font-weight:500; letter-spacing:.15em;
      text-transform:uppercase; color:var(--text-muted);
      border:1px solid var(--border); border-radius:100px; padding:5px 14px; margin-bottom:28px;
    }
    .landing-title {
      font-family:'Noto Serif SC',serif;
      font-size:clamp(28px,5.5vw,44px); font-weight:700; line-height:1.25; margin-bottom:20px;
    }
    .landing-sub {
      font-size:15px; font-weight:300; color:var(--text-secondary);
      line-height:1.9; max-width:500px; margin:0 auto 12px;
    }
    .landing-note { font-size:12px; color:var(--text-muted); margin-bottom:44px; font-style:italic; }
    .landing-stats { display:flex; gap:28px; justify-content:center; margin-bottom:44px; flex-wrap:wrap; }
    .stat-item { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .stat-num { font-family:'Noto Serif SC',serif; font-size:22px; font-weight:700; }
    .stat-label { font-size:11px; color:var(--text-muted); }
    .btn-start {
      display:inline-block; background:var(--accent); color:#fff;
      font-size:15px; font-weight:500; padding:14px 44px;
      border-radius:100px; border:none; cursor:pointer;
      letter-spacing:.03em; font-family:inherit;
      transition:opacity .2s,transform .15s;
    }
    .btn-start:hover { opacity:.82; transform:translateY(-1px); }
    .landing-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:44px; }
    .dim-chip {
      font-size:11px; padding:5px 12px;
      border:1px solid var(--border); border-radius:100px; color:var(--text-muted);
    }

    /* ── Question ── */
    #screen-question { padding-top:48px; }
    .q-meta {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
    }
    .btn-back {
      font-size:13px; color:var(--text-muted); background:none; border:none;
      cursor:pointer; font-family:inherit; padding:0;
      transition:color .15s; visibility:hidden;
    }
    .btn-back.visible { visibility:visible; }
    .btn-back:hover { color:var(--text-primary); }
    .q-type-badge {
      font-size:10px; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; padding:3px 9px; border-radius:100px; border:1px solid;
    }
    .badge-choice { color:#e8623a; border-color:#e8623a; }
    .badge-stance { color:#0891b2; border-color:#0891b2; }
    .q-text {
      font-family:'Noto Serif SC',serif;
      font-size:clamp(17px,3vw,22px); font-weight:600; line-height:1.7;
      margin-bottom:32px;
    }
    .options-list { display:flex; flex-direction:column; gap:10px; }
    .option-btn {
      display:flex; align-items:flex-start; gap:14px; padding:16px 20px;
      background:var(--surface); border:1.5px solid var(--border); border-radius:var(--radius);
      cursor:pointer; text-align:left; width:100%; font-family:inherit;
      transition:border-color .15s,background .15s,transform .1s;
    }
    .option-btn:hover { border-color:var(--accent); background:var(--hover-bg); transform:translateX(3px); }
    .option-btn.selected { border-color:var(--accent); background:var(--hover-bg); }
    .option-text { font-size:14px; line-height:1.75; color:var(--text-primary); font-weight:400; }
    .stance-container { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:8px; }
    @media(max-width:480px){ .stance-container{grid-template-columns:1fr} }
    .stance-btn {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:6px; padding:22px 12px; border:1.5px solid var(--border); border-radius:var(--radius);
      cursor:pointer; background:var(--surface); font-family:inherit;
      transition:border-color .15s,background .15s,transform .1s;
    }
    .stance-btn:hover { transform:translateY(-2px); }
    .stance-oppose:hover    { border-color:#dc2626; background:#fef2f2; color:#dc2626; }
    .stance-neutral:hover   { border-color:#6b7280; background:#f9fafb; color:#6b7280; }
    .stance-support:hover   { border-color:#16a34a; background:#f0fdf4; color:#16a34a; }
    .stance-btn.sel-oppose  { border-color:#dc2626; background:#fef2f2; color:#dc2626; }
    .stance-btn.sel-neutral { border-color:#6b7280; background:#f9fafb; color:#6b7280; }
    .stance-btn.sel-support { border-color:#16a34a; background:#f0fdf4; color:#16a34a; }
    .stance-icon { font-size:22px; }
    .stance-word { font-size:16px; font-weight:700; }
    .stance-sub  { font-size:11px; color:var(--text-muted); text-align:center; line-height:1.4; }

    /* ── Result ── */
    #screen-result { padding-top:48px; }
    .result-header-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:28px;
    }
    @media(max-width:520px){ .result-header-grid{grid-template-columns:1fr} }
    .result-card {
      padding:24px; border-radius:var(--radius); border:1.5px solid var(--border); background:var(--surface);
    }
    .rc-label {
      font-size:10px; font-weight:600; letter-spacing:.15em; text-transform:uppercase;
      color:var(--text-muted); margin-bottom:10px;
    }
    .rc-value { font-family:'Noto Serif SC',serif; font-size:clamp(18px,3vw,24px); font-weight:700; margin-bottom:4px; }
    .rc-en { font-size:12px; color:var(--text-muted); margin-bottom:12px; }
    .rc-desc { font-size:13px; line-height:1.8; color:var(--text-secondary); }
    .score-pill {
      display:inline-block; font-size:11px; font-weight:600;
      padding:3px 10px; border-radius:100px; color:#fff; margin-bottom:10px;
    }
    .spec-chart { margin-bottom:28px; }
    .spec-title {
      font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
      color:var(--text-muted); margin-bottom:14px;
    }
    .spec-row { display:flex; flex-direction:column; gap:10px; }
    .spec-item { display:flex; flex-direction:column; gap:5px; }
    .spec-header { display:flex; justify-content:space-between; align-items:baseline; }
    .spec-name { font-size:13px; font-weight:500; }
    .spec-pct { font-size:12px; color:var(--text-muted); }
    .spec-bar-bg { height:5px; background:var(--border); border-radius:100px; overflow:hidden; }
    .spec-bar-fill { height:100%; border-radius:100px; transition:width 1s cubic-bezier(.16,1,.3,1); width:0; }
    .tf-summary {
      padding:20px 24px; background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); margin-bottom:28px;
    }
    .tf-summary-title {
      font-size:11px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
      color:var(--text-muted); margin-bottom:14px;
    }
    .tf-result-list { display:flex; flex-direction:column; gap:8px; }
    .tf-result-row { display:flex; gap:10px; align-items:flex-start; font-size:13px; line-height:1.6; color:var(--text-secondary); }
    .tf-mark { flex-shrink:0; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; margin-top:1px; }
    .result-quote { font-family:'Noto Serif SC',serif; font-size:14px; color:var(--text-muted); text-align:center; margin:0 0 36px; padding:0 12px; line-height:1.8; font-style:italic; }
    .btn-retry {
      background:transparent; color:var(--text-primary); font-size:14px; font-weight:500;
      padding:12px 32px; border-radius:100px; border:1.5px solid var(--border);
      cursor:pointer; font-family:inherit; transition:border-color .2s,background .2s;
    }
    .btn-retry:hover { border-color:var(--accent); background:var(--hover-bg); }
    @media(max-width:480px){ .site-header{padding:18px 16px 0} .container{padding:0 16px 60px} }
  </style>
</head>
<body>
<div id="progress-bar-wrap"><div id="progress-bar-fill"></div></div>
<header class="site-header">
  <div class="logo">Major-TI · v2</div>
  <div class="q-counter" id="q-counter"></div>
</header>
<main class="container">

  <!-- LANDING -->
  <section class="screen active" id="screen-landing">
    <div class="landing-badge">四维认知偏好识别系统</div>
    <h1 class="landing-title">你的思维，<br/>会暴露你更像哪个学科</h1>
    <p class="landing-sub">
      这不是知识竞赛，也不是标准答案测试。<br/>
      <span id="landing-question-count-text">20</span> 道题只看一件事：面对复杂问题时，<br/>
      你更自然调用哪套认知工具。
    </p>
    <p class="landing-note">没有正确答案，只有更稳定的偏好。</p>
    <div class="landing-stats">
      <div class="stat-item"><span class="stat-num" id="landing-question-count">20</span><span class="stat-label">道题目</span></div>
      <div class="stat-item"><span class="stat-num">4</span><span class="stat-label">认知维度</span></div>
      <div class="stat-item"><span class="stat-num">5</span><span class="stat-label">专业原型</span></div>
    </div>
    <button class="btn-start" id="btn-start">开始诊断</button>
    <div class="landing-chips">
      <span class="dim-chip">机制导向</span><span class="dim-chip">叙事导向</span>
      <span class="dim-chip">系统优化</span><span class="dim-chip">规则裁决</span>
      <span class="dim-chip">激励分析</span><span class="dim-chip">价值判断</span>
      <span class="dim-chip">证据导向</span><span class="dim-chip">情境导向</span>
    </div>
  </section>

  <!-- QUESTION -->
  <section class="screen" id="screen-question">
    <div class="q-meta">
      <button class="btn-back" id="btn-back">← 上一题</button>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="q-type-badge" id="q-type-badge"></span>
      </div>
    </div>
    <div class="q-text" id="q-text"></div>
    <div id="q-body"></div>
  </section>

  <!-- RESULT -->
  <section class="screen" id="screen-result">
    <div style="margin-bottom:8px">
      <span style="font-size:11px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted)">你的认知画像</span>
    </div>
    <div class="result-header-grid">
      <div class="result-card" id="edu-card"></div>
      <div class="result-card" id="spec-card"></div>
    </div>
    <div class="spec-chart">
      <div class="spec-title">专业原型分布</div>
      <div class="spec-row" id="spec-row"></div>
    </div>
    <div class="tf-summary">
      <div class="tf-summary-title">维度解读</div>
      <div class="tf-result-list" id="dimension-list"></div>
    </div>
    <p class="result-quote" id="result-quote"></p>
    <button class="btn-retry" id="btn-retry">再测一次</button>
  </section>

</main>

let currentQ = 0;
let allQuestions = [...QUESTIONS];
const specScores = { science:0, engineering:0, economics:0, law:0, humanities:0 };
const dimScores = { mn:0, sr:0, iv:0, ec:0 };
const history = [];

function addScore(target, delta) {
  if (!delta) return;
  Object.entries(delta).forEach(([key, value]) => {
    target[key] = (target[key] || 0) + value;
  });
}

function subScore(target, delta) {
  if (!delta) return;
  Object.entries(delta).forEach(([key, value]) => {
    target[key] = (target[key] || 0) - value;
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
  document.getElementById(id).classList.add('active', 'fade-in');
}

function updateProgress() {
  const total = allQuestions.length;
  const pct = total > 0 ? (currentQ / total) * 100 : 0;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${total}`;
  document.getElementById('btn-back').classList.toggle('visible', currentQ > 0);
}

function syncLandingQuestionCount() {
  const count = String(QUESTIONS.length);
  const statEl = document.getElementById('landing-question-count');
  const textEl = document.getElementById('landing-question-count-text');
  if (statEl) statEl.textContent = count;
  if (textEl) textEl.textContent = count;
}

function shuffleArr(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function computeNormedSpec(questionList) {
  const max = { science:0, engineering:0, economics:0, law:0, humanities:0 };
  questionList.forEach(question => {
    if (question.type === 'stance') {
      Object.keys(max).forEach(spec => {
        const best = Math.max(...Object.values(question.stances).map(stance => (stance.spec && stance.spec[spec]) || 0));
        max[spec] += best;
      });
    } else {
      Object.keys(max).forEach(spec => {
        const best = Math.max(...question.options.map(option => (option.spec && option.spec[spec]) || 0));
        max[spec] += best;
      });
    }
  });
  const normed = {};
  Object.keys(specScores).forEach(key => {
    normed[key] = max[key] > 0 ? Math.min(specScores[key] / max[key], 1) : 0;
  });
  return normed;
}

function getDimensionSummary(key) {
  const meta = DIMENSIONS[key];
  const score = dimScores[key];
  const total = QUESTIONS
    .filter(question => {
      if (question.type === 'stance') {
        return Object.values(question.stances).some(stance => Object.prototype.hasOwnProperty.call(stance.dimDelta, key));
      }
      return question.options.some(option => Object.prototype.hasOwnProperty.call(option.dimDelta, key));
    })
    .reduce((sum, question) => {
      if (question.type === 'stance') {
        return sum + Math.max(...Object.values(question.stances).map(stance => Math.abs((stance.dimDelta && stance.dimDelta[key]) || 0)));
      }
      return sum + Math.max(...question.options.map(option => Math.abs((option.dimDelta && option.dimDelta[key]) || 0)));
    }, 0);
  const leaning = score >= 0 ? meta.left : meta.right;
  const strength = total > 0 ? Math.round(Math.abs(score) / total * 100) : 0;
  return { meta, score, leaning, strength };
}

function startQuiz() {
  currentQ = 0;
  allQuestions = shuffleArr(QUESTIONS).map(question => {
    if (question.type === 'choice') {
      return { ...question, options: shuffleArr(question.options) };
    }
    return question;
  });
  history.length = 0;
  Object.keys(specScores).forEach(key => { specScores[key] = 0; });
  Object.keys(dimScores).forEach(key => { dimScores[key] = 0; });
  document.getElementById('progress-bar-wrap').style.display = 'block';
  document.getElementById('q-counter').style.display = 'block';
  renderQuestion();
  showScreen('screen-question');
}

function renderQuestion() {
  const question = allQuestions[currentQ];
  updateProgress();
  const badge = document.getElementById('q-type-badge');
  if (question.type === 'choice') {
    badge.textContent = '情境题';
    badge.className = 'q-type-badge badge-choice';
  } else {
    badge.textContent = '立场题';
    badge.className = 'q-type-badge badge-stance';
  }
  document.getElementById('q-text').textContent = question.text;

  const body = document.getElementById('q-body');
  body.innerHTML = '';
  if (question.type === 'choice') {
    const list = document.createElement('div');
    list.className = 'options-list';
    question.options.forEach(option => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-text">${option.text}</span>`;
      btn.addEventListener('click', () => {
        btn.classList.add('selected');
        list.querySelectorAll('.option-btn').forEach(node => { node.style.pointerEvents = 'none'; });
        addScore(specScores, option.spec);
        addScore(dimScores, option.dimDelta);
        history.push({ specDelta: option.spec || {}, dimDelta: option.dimDelta || {} });
        setTimeout(advance, 320);
      });
      list.appendChild(btn);
    });
    body.appendChild(list);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'stance-container';
    [
      { key:'oppose', label:'不同意', icon:'✕', cls:'stance-oppose', sel:'sel-oppose', sub:'不太像我' },
      { key:'neutral', label:'不确定', icon:'−', cls:'stance-neutral', sel:'sel-neutral', sub:'看情况' },
      { key:'support', label:'同意', icon:'✓', cls:'stance-support', sel:'sel-support', sub:'比较像我' }
    ].forEach(({ key, label, icon, cls, sel, sub }) => {
      const stance = question.stances[key];
      const btn = document.createElement('button');
      btn.className = `stance-btn ${cls}`;
      btn.innerHTML = `<span class="stance-icon">${icon}</span>
        <span class="stance-word">${label}</span>
        <span class="stance-sub">${sub}</span>`;
      btn.addEventListener('click', () => {
        btn.classList.add(sel);
        wrap.querySelectorAll('.stance-btn').forEach(node => { node.style.pointerEvents = 'none'; });
        addScore(specScores, stance.spec);
        addScore(dimScores, stance.dimDelta);
        history.push({ specDelta: stance.spec || {}, dimDelta: stance.dimDelta || {} });
        setTimeout(advance, 320);
      });
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
  }
  const questionScreen = document.getElementById('screen-question');
  questionScreen.classList.remove('fade-in');
  void questionScreen.offsetWidth;
  questionScreen.classList.add('fade-in');
}

function advance() {
  currentQ++;
  if (currentQ < allQuestions.length) {
    renderQuestion();
  } else {
    showResults();
  }
}

function goBack() {
  if (currentQ === 0) return;
  const last = history.pop();
  subScore(specScores, last.specDelta);
  subScore(dimScores, last.dimDelta);
  currentQ--;
  showScreen('screen-question');
  renderQuestion();
}

function showResults() {
  document.getElementById('progress-bar-fill').style.width = '100%';
  document.getElementById('q-counter').style.display = 'none';

  const summaries = Object.keys(DIMENSIONS).map(getDimensionSummary);
  const profileCode = summaries.map(item => item.score >= 0 ? item.meta.shortLeft : item.meta.shortRight).join('');
  const profileCodeEn = summaries.map(item => item.score >= 0 ? item.meta.codeLeft : item.meta.codeRight).join('');
  const profileLegend = summaries.map(item => {
    const code = item.score >= 0 ? item.meta.codeLeft : item.meta.codeRight;
    const termEn = item.score >= 0 ? item.meta.leftEn : item.meta.rightEn;
    return `${code} = ${termEn}（${item.leaning}）`;
  }).join(' / ');

  const profileCard = document.getElementById('edu-card');
  profileCard.style.borderColor = '#111827';
  profileCard.innerHTML = `<div class="rc-label">认知编码</div>
    <span class="score-pill" style="background:#111827">4D Profile</span>
    <div class="rc-value" style="color:#111827">${profileCodeEn} 型</div>
    <div class="rc-en">${profileCode}型 · ${profileLegend}</div>
    <div class="rc-desc">${profileCodeEn} 型表示：${profileLegend}。你在四个维度上的主导偏向分别是：${summaries.map(item => item.leaning).join('、')}。这里测的不是知识对错，而是你更习惯用哪套方法理解复杂问题。</div>`;

  const normed = computeNormedSpec(allQuestions);
  const topSpec = Object.entries(normed).sort((a, b) => b[1] - a[1])[0][0];
  const archetype = PROFILE_ARCHETYPES[topSpec];
  const specCard = document.getElementById('spec-card');
  specCard.style.borderColor = archetype.color;
  specCard.innerHTML = `<div class="rc-label">推断专业原型</div>
    <span class="score-pill" style="background:${archetype.color}">${archetype.en}</span>
    <div class="rc-value" style="color:${archetype.color}">${archetype.name}</div>
    <div class="rc-en">${archetype.en}</div>
    <div class="rc-desc">${archetype.desc}</div>`;

  const specRow = document.getElementById('spec-row');
  specRow.innerHTML = '';
  Object.entries(normed).sort((a, b) => b[1] - a[1]).forEach(([key, value]) => {
    const pct = Math.round(value * 100);
    const item = document.createElement('div');
    item.className = 'spec-item';
    item.innerHTML = `<div class="spec-header">
        <span class="spec-name">${PROFILE_ARCHETYPES[key].name}</span>
        <span class="spec-pct">${pct}%</span>
      </div>
      <div class="spec-bar-bg">
        <div class="spec-bar-fill" style="background:${PROFILE_ARCHETYPES[key].color}" data-pct="${pct}"></div>
      </div>`;
    specRow.appendChild(item);
  });

  const dimensionList = document.getElementById('dimension-list');
  dimensionList.innerHTML = '';
  summaries.forEach(item => {
    const code = item.score >= 0 ? item.meta.codeLeft : item.meta.codeRight;
    const term = item.score >= 0 ? item.meta.left : item.meta.right;
    const termEn = item.score >= 0 ? item.meta.leftEn : item.meta.rightEn;
    const row = document.createElement('div');
    row.className = 'tf-result-row';
    row.innerHTML = `<span class="tf-mark" style="background:${item.meta.color}">${code}</span>
      <div>
        <div style="font-weight:500;margin-bottom:3px;font-size:12px;color:var(--text-primary)">${code} = ${termEn}（${term}） · ${item.meta.label} · 倾向度 ${item.strength}%</div>
        <div>${item.score >= 0 ? item.meta.descLeft : item.meta.descRight}</div>
      </div>`;
    dimensionList.appendChild(row);
  });

  document.getElementById('result-quote').textContent = `"${profileCodeEn} 型"不是标准答案，只是你看世界时最顺手的那套认知工具。`;
  showScreen('screen-result');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.spec-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  }));
}

document.getElementById('btn-start').addEventListener('click', startQuiz);
document.getElementById('btn-back').addEventListener('click', goBack);
document.getElementById('btn-retry').addEventListener('click', () => {
  document.getElementById('progress-bar-wrap').style.display = 'none';
  showScreen('screen-landing');
});
syncLandingQuestionCount();
